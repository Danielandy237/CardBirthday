<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Anniversaire Surprise Christophe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:black;
color:white;
font-family:Arial,sans-serif;
background-image:url("image/image.jpg");
background-size: cover;
}


/* PARTICULES */

.particle{
position:fixed;
top:-10px;
width:6px;
height:6px;
background:gold;
border-radius:50%;
box-shadow:0 0 10px gold;
opacity:.8;
animation:fall linear infinite;
z-index:5;
}


@keyframes fall{

0%{
transform:translateY(0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}


/* PAGE PRINCIPALE AVEC PHOTO */

.container{

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

position:relative;


/* TON IMAGE */

background-image:
url("image/image.jpg");


background-size: contain;
background-position: 50%;

}


/* VIGNETTE CINEMA */

.container::before{

content:"";

position:absolute;

inset:0;

background:
radial-gradient(
circle,
transparent 20%,
rgba(0,0,0,.7) 100%
);

}


.container>*{

position:relative;
z-index:2;

}



/* TITRE */

h2{

font-size:28px;

letter-spacing:10px;

margin-bottom:20px;

opacity:.9;

}



h1{

font-size:120px;

font-weight:bold;


background:
linear-gradient(
45deg,
#8a6500,
#ffd700,
#fff2a8,
#d4af37,
#8a6500
);


-webkit-background-clip:text;

-webkit-text-fill-color:transparent;


animation:pop 1.5s ease;

position:relative;

}



/* REFLET OR */

h1::after{

content:"";

position:absolute;

top:0;

left:-100%;

width:50%;

height:100%;


background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,.8),
transparent
);


transform:skewX(-20deg);

animation:shine 3s infinite;

}






/* ENVELOPPE */


.enveloppe{

width:380px;

height:250px;

position:relative;

cursor:pointer;

margin-top:25px;

filter:drop-shadow(0 25px 40px black);

transition:.4s;

}



.enveloppe:hover{

transform:scale(1.05);

filter:drop-shadow(0 30px 60px gold);

}



/* CORPS */

.corps{

position:absolute;

width:100%;

height:100%;


background:
linear-gradient(
145deg,
#222,
#050505
);


border-radius:12px;

}



/* RABAT */

.rabat{

position:absolute;

top:0;

left:0;


border-left:190px solid transparent;

border-right:190px solid transparent;

border-top:140px solid #111;

}



/* SCEAU */

.sceau{

position:absolute;

top:95px;

left:155px;


width:70px;

height:70px;


background:
radial-gradient(
circle,
red,
#300
);


border-radius:50%;


display:flex;

align-items:center;

justify-content:center;


font-size:35px;


box-shadow:
0 0 25px red,
0 0 60px red;


animation:pulse 2s infinite;

}



@keyframes pulse{

50%{

transform:scale(1.1);

}

}




.clique{

position:absolute;

bottom:25px;

width:100%;

font-size:18px;

letter-spacing:5px;

opacity:.8;

}



.enveloppe:hover .clique{

color:gold;

letter-spacing:8px;

}



/* ANIMATION TITRE */

@keyframes pop{

from{

transform:scale(.8);

opacity:0;

}


to{

transform:scale(1);

opacity:1;

}

}


</style>


</head>


<body>



<script>

function createParticle(){

let p=document.createElement("div");

p.className="particle";


p.style.left=Math.random()*window.innerWidth+"px";

p.style.animationDuration=
(3+Math.random()*4)+"s";


document.body.appendChild(p);


setTimeout(()=>{

p.remove();

},8000);


}


setInterval(createParticle,120);


</script>



<div class="container">


<h2>
ANNIVERSAIRE SURPRISE
</h2>


<h1>
Christophe
</h1>



<div class="enveloppe" onclick="ouvrir()">



<div class="corps"></div>

<div class="rabat"></div>


<div class="sceau">
❤
</div>


<div class="clique">
CLIQUEZ ICI
</div>


</div>


</div>



<script>

function ouvrir(){

window.location.href="carte4.html";

}

</script>


</body>

</html>
